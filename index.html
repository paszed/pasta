<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pasta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>🍝 Pasta</h1>
  <p>Paste messy text → get clean output</p>

  <div class="container">
    <textarea id="input" placeholder="Paste your messy text here..."></textarea>

    <button id="cleanBtn">Clean</button>

    <textarea id="output" placeholder="Clean result..." readonly></textarea>

    <button id="copyBtn">Copy</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
